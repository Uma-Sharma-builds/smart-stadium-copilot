<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Smart Stadium Copilot</title>
<style>
  body { font-family: Arial, sans-serif; background: #0f1115; color: #eee; margin: 0; padding: 20px; }
  h1 { text-align: center; color: #4fc3f7; }
  .container { max-width: 700px; margin: 0 auto; }
  .form-box { background: #1a1d24; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
  input, textarea { width: 100%; padding: 10px; margin: 8px 0; border-radius: 6px; border: none; box-sizing: border-box; }
  button { background: #4fc3f7; color: #000; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; }
  button:hover { background: #29b6f6; }
  .card { background: #1a1d24; padding: 15px; border-radius: 8px; margin-bottom: 12px; border-left: 5px solid #888; }
  .High { border-left-color: #ff5252; }
  .Medium { border-left-color: #ffca28; }
  .Low { border-left-color: #66bb6a; }
  .tag { display: inline-block; padding: 3px 8px; border-radius: 4px; font-size: 12px; margin-right: 6px; }
  #status { text-align: center; margin: 10px 0; color: #ffb74d; }
</style>
</head>
<body>
<div class="container">
  <h1>🏟️ Smart Stadium Copilot</h1>

  <div class="form-box">
    <input id="location" placeholder="Location (e.g. Gate 3, Section B)">
    <textarea id="description" placeholder="Describe the issue..." rows="3"></textarea>
    <button onclick="submitReport()">Submit Report</button>
    <div id="status"></div>
  </div>

  <h2>Live Reports</h2>
  <div id="reportsList">Loading...</div>
</div>

<script>
async function submitReport() {
  const location = document.getElementById("location").value;
  const description = document.getElementById("description").value;
  const status = document.getElementById("status");

  if (!location || !description) {
    status.textContent = "Please fill both fields.";
    return;
  }

  status.textContent = "Processing with AI...";

  try {
    const res = await fetch("/report", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ location, description })
    });
    const data = await res.json();

    if (!res.ok) {
      status.textContent = "Error: " + (data.error || "Something went wrong");
      return;
    }

    status.textContent = "Report submitted!";
    document.getElementById("location").value = "";
    document.getElementById("description").value = "";
    loadReports();
  } catch (err) {
    status.textContent = "Network error: " + err.message;
  }
}

async function loadReports() {
  const res = await fetch("/reports");
  const data = await res.json();
  const list = document.getElementById("reportsList");

  if (data.length === 0) {
    list.innerHTML = "<p>No reports yet.</p>";
    return;
  }

  list.innerHTML = data.map(r => `
    <div class="card ${r.urgency}">
      <span class="tag">${r.category}</span>
      <span class="tag">Urgency: ${r.urgency}</span>
      <p><strong>${r.location}</strong>: ${r.description}</p>
      <p>💡 ${r.suggestion}</p>
    </div>
  `).join("");
}

loadReports();
setInterval(loadReports, 5000);
</script>
</body>
